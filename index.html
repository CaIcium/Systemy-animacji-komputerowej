<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>tytul</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
    }
    canvas {
        display: block;
    }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Particle {
    constructor(x, y, vx, vy, hue) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.hue = hue;

        this.alpha = 1;
        this.decay = 0.015;
        this.active = true;
    }

    update(gravity, canvasHeight) {
        // Pozycja
        this.x += this.vx;
        this.y += this.vy;

        // Grawitacja
        this.vy += gravity;

        // Opór powietrza
        this.vx *= 0.98;
        this.vy *= 0.98;

        // Zanikanie
        this.alpha -= this.decay;
        if (this.alpha <= 0) {
            this.active = false;
        }

        // Kolizja z podłożem
        if (this.y >= canvasHeight) {
            this.y = canvasHeight;
            this.vy *= -0.6;
        }
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 100%, 50%, ${this.alpha})`;
        ctx.fill();}
}

// klasa fajerwerków 
class Firework {
    constructor(startX, startY, targetX, targetY) {
        this.x = startX;
        this.y = startY;
        this.targetX = targetX;
        this.targetY = targetY;

        this.speed = 8;
        this.active = true;
        this.exploded = false;
        this.hue = Math.random() * 360;

        const dx = targetX - startX;
        const dy = targetY - startY;
        const dist = Math.hypot(dx, dy);

        this.vx = (dx / dist) * this.speed;
        this.vy = (dy / dist) * this.speed;


    }

    update() {
        this.x += this.vx;
        this.y += this.vy;

        const distance = Math.hypot(this.targetX -this.x, this.targetY - this.y);
        if (distance < 5) {
            this.exploded = true;
            this.active = false;
        }
    }

    draw(ctx) {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 4, 0,Math.PI * 2);
        ctx.fillStyle = `hsl(${this.hue}, 100%, 50%)`;
        ctx.fill();
    }

    explode(particleCount = 80) {
        const particles = [];

        for (let i = 0; i < particleCount; i++) {
            const angle = Math.random() *Math.PI * 2;
            const speed = Math.random() * 6;

            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;

            const hueVariation = this.hue + (Math.random() * 40 - 20);

            particles.push(
                new Particle(this.x, this.y, vx, vy, hueVariation)
            );
        }

        return particles;
    }
}

// klasa pokazywania fajerwerków 
class FireworkShow {
    constructor(canvas, ctx) {
        this.canvas = canvas;
        this.ctx = ctx;

        this.particles = [];
        this.rockets = [];

        this.gravity = 0.15;
        this.particleCount = 80;

        this.initEvents();
        this.loop();
    }

    initEvents() {
        this.canvas.addEventListener("click", (e) => {
            const rect = this.canvas.getBoundingClientRect();
            const targetX = e.clientX - rect.left;
            const targetY = e.clientY - rect.top;

            const rocket = new Firework(
                this.canvas.width / 2,
                this.canvas.height,
                targetX,
                targetY
            );

            this.rockets.push(rocket);
        });
    }

    update() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // fajerwerka 
        this.rockets.forEach(rocket => {
            rocket.update();
            rocket.draw(this.ctx);

            if (rocket.exploded) {
                const newParticles = rocket.explode(this.particleCount);
                this.particles.push(...newParticles);
            }
        });

        // czasteczki
        this.particles.forEach(particle => {
            particle.update(this.gravity, this.canvas.height);
            particle.draw(this.ctx);
        });

        // Usuwanie nieaktywnych
        this.rockets = this.rockets.filter(r => r.active);
        this.particles = this.particles.filter(p => p.active);
    }

    loop() {
        this.update();
        requestAnimationFrame(() => this.loop());
    }
}

//start programu 
new FireworkShow(canvas, ctx);

</script>
</body>
</html>
